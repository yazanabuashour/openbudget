name: Pull request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  policy-checks:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify required repository files
        run: |
          required_files=(
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
            .github/CODEOWNERS
            .github/PULL_REQUEST_TEMPLATE.md
            .github/dependabot.yml
            .github/workflows/pull-request.yml
            .github/workflows/release.yml
          )

          for file in "${required_files[@]}"; do
            test -f "${file}"
          done

      - name: Reject machine-absolute paths in docs
        run: |
          if grep -RInE '/Users/|/home/|[A-Za-z]:\\\\' \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            docs \
            .github/ISSUE_TEMPLATE \
            .github/PULL_REQUEST_TEMPLATE.md; then
            echo "Remove machine-absolute filesystem paths from committed docs."
            exit 1
          fi

  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          files="$(find . -name '*.go' -not -path './vendor/*')"

          if [ -n "${files}" ] && [ -n "$(gofmt -l ${files})" ]; then
            echo "Run gofmt before pushing changes."
            gofmt -l ${files}
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4 run ./...

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
